    <!-- JavaScript to load content dynamically -->
    <script>
        
        // Dynamically set the base URL based on the current URL path
        const baseUrl = window.location.pathname.replace(/\/$/, "") + "/";
        
        // Function to load content dynamically without refreshing the page
        function loadContent(page) {
            $.ajax({
                url: baseUrl + page, // Prefix with baseUrl to ensure the correct URL
                success: function(data) {
                    $('#content').html(data); // Inject the content into the #content div
                },
                error: function() {
                    $('#content').html('<p>Sorry, there was an error loading the content.</p>');
                }
            });
        }
    </script>
